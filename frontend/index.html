<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TalentScout – Document Q&A Assistant</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0f172a;
            --card-bg: #1e293b;
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
            --success: #22c55e;
            --error: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            padding: 40px 20px;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            margin-bottom: 10px;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        p.subtitle {
            color: var(--text-dim);
            margin-bottom: 40px;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        .card {
            background: var(--card-bg);
            padding: 30px;
            margin-bottom: 24px;
            border-radius: 16px;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .card h3 {
            margin-top: 0;
            font-weight: 600;
            color: var(--primary);
        }

        input[type="file"] {
            display: block;
            width: 100%;
            margin-bottom: 15px;
            color: var(--text-dim);
        }

        input[type="text"] {
            width: 100%;
            padding: 12px 16px;
            margin: 15px 0;
            border-radius: 8px;
            border: 1px solid #334155;
            background: #0f172a;
            color: white;
            box-sizing: border-box;
            font-size: 1rem;
            transition: border-color 0.2s;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 12px;
            background: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 8px;
            font-weight: 600;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--primary-hover);
            transform: translateY(-1px);
        }

        button:disabled {
            background: #475569;
            cursor: not-allowed;
            transform: none;
        }

        .status {
            margin-top: 15px;
            font-size: 0.9rem;
        }

        .success { color: var(--success); }
        .error { color: var(--error); }

        #answer-container {
            display: none;
            text-align: left;
            line-height: 1.6;
        }

        .sources {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--text-dim);
            border-top: 1px solid #334155;
            padding-top: 10px;
        }

        .loader {
            display: none;
            border: 3px solid #334155;
            border-top: 3px solid var(--primary);
            border-radius: 50%;
            width: 24px;
            height: 24px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>

<body>

    <h1>TalentScout</h1>
    <p class="subtitle">Intelligent Document Q&A Assistant</p>

    <div class="container">
        <div class="card">
            <h3>Upload Document</h3>
            <p style="color: var(--text-dim); font-size: 0.85rem; margin-bottom: 15px;">Supported formats: .txt, .pdf</p>
            <input type="file" id="file" accept=".txt,.pdf">
            <button id="uploadBtn" onclick="upload()">Upload & Process</button>
            <div id="uploadLoader" class="loader"></div>
            <div id="uploadStatus" class="status"></div>
        </div>

        <div class="card">
            <h3>Ask a Question</h3>
            <input type="text" id="question" placeholder="What would you like to know about the document?">
            <button id="askBtn" onclick="ask()">Ask Assistant</button>

            <div id="askLoader" class="loader"></div>
            
            <div id="answer-container">
                <h4 style="color: var(--primary); margin-bottom: 8px;">Answer</h4>
                <p id="answer-text"></p>
                <div id="sources" class="sources"></div>
            </div>
        </div>
    </div>

<script>
    let doc_id = "";
    const BASE_URL = "https://q-and-a-bot.onrender.com"; 

    async function upload() {
        const fileInput = document.getElementById("file");
        const file = fileInput.files[0];
        const btn = document.getElementById("uploadBtn");
        const loader = document.getElementById("uploadLoader");
        const status = document.getElementById("uploadStatus");

        if (!file) {
            status.innerHTML = `<span class="error">Please select a file first.</span>`;
            return;
        }

        // UI State: Loading
        btn.disabled = true;
        loader.style.display = "block";
        status.innerHTML = "";

        let formData = new FormData();
        formData.append("file", file);

        try {
            let res = await fetch(BASE_URL + "/upload", {
                method: "POST",
                body: formData
            });

            let data = await res.json();

            if (res.ok) {
                doc_id = data.document_id;
                status.innerHTML = `<span class="success">✓ Uploaded: ${data.filename} (${data.total_chunks} segments)</span>`;
            } else {
                status.innerHTML = `<span class="error">✗ ${data.detail || 'Upload failed'}</span>`;
            }
        } catch (err) {
            status.innerHTML = `<span class="error">✗ Connection error. Is the backend running?</span>`;
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }

    async function ask() {
        const questionInput = document.getElementById("question");
        const question = questionInput.value.trim();
        const btn = document.getElementById("askBtn");
        const loader = document.getElementById("askLoader");
        const answerContainer = document.getElementById("answer-container");
        const answerText = document.getElementById("answer-text");
        const sourcesDiv = document.getElementById("sources");

        if (!doc_id) {
            alert("Please upload a document first.");
            return;
        }

        if (!question) {
            alert("Please enter a question.");
            return;
        }

        // UI State: Loading
        btn.disabled = true;
        loader.style.display = "block";
        answerContainer.style.display = "none";

        try {
            let res = await fetch(BASE_URL + "/ask", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({
                    document_id: doc_id,
                    question: question
                })
            });

            let data = await res.json();

            if (res.ok) {
                answerContainer.style.display = "block";
                answerText.innerText = data.answer;
                sourcesDiv.innerText = "Source segments: " + data.sources.join(", ");
            } else {
                alert("Error: " + (data.detail || "Failed to get an answer."));
            }
        } catch (err) {
            alert("Connection error. Please try again.");
        } finally {
            btn.disabled = false;
            loader.style.display = "none";
        }
    }
</script>

</body>
</html>
