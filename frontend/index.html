<!DOCTYPE html>
<html>
<head>
    <title>Document QA</title>
    <style>
        body {
            font-family: Arial;
            background: #0f172a;
            color: white;
            text-align: center;
        }

        .card {
            background: #1e293b;
            padding: 20px;
            margin: 20px auto;
            width: 400px;
            border-radius: 12px;
        }

        input {
            padding: 10px;
            width: 90%;
            margin: 10px;
        }

        button {
            padding: 10px;
            background: #38bdf8;
            border: none;
            cursor: pointer;
        }

        .success { color: green; }
        .error { color: red; }
    </style>
</head>

<body>

<h1>📄 Document QA</h1>

<div class="card">
    <h3>Upload</h3>
    <input type="file" id="file" accept=".txt">
    <button onclick="upload()">Upload</button>
    <p id="uploadStatus"></p>
</div>

<div class="card">
    <h3>Ask Question</h3>
    <input type="text" id="question">
    <button onclick="ask()">Ask</button>

    <p id="loading"></p>
    <p id="answer"></p>
    <p id="sources"></p>
</div>

<script>

let doc_id = "";
const BASE_URL = "https://q-and-a-bot.onrender.com"; 
async function upload() {
    let file = document.getElementById("file").files[0];

    let formData = new FormData();
    formData.append("file", file);

    let res = await fetch(BASE_URL + "/upload", {
        method: "POST",
        body: formData
    });

    let data = await res.json();

    if (res.ok) {
        doc_id = data.document_id;
        document.getElementById("uploadStatus").innerHTML =
            `<span class="success">Uploaded: ${data.filename} | Chunks: ${data.total_chunks}</span>`;
    } else {
        document.getElementById("uploadStatus").innerHTML =
            `<span class="error">${data.detail}</span>`;
    }
}

async function ask() {

    let question = document.getElementById("question").value;

    if (!doc_id) {
        alert("Upload document first");
        return;
    }

    document.getElementById("loading").innerText = "Thinking...";

    let res = await fetch(BASE_URL + "/ask", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({
            document_id: doc_id,
            question: question
        })
    });

    let data = await res.json();

    document.getElementById("loading").innerText = "";

    if (res.ok) {
        document.getElementById("answer").innerText = data.answer;
        document.getElementById("sources").innerText = "Sources: " + data.sources;
    } else {
        document.getElementById("answer").innerHTML =
            `<span class="error">${data.detail}</span>`;
    }
}

</script>

</body>
</html>
